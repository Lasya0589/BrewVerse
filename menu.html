<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewVerse | Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar container">
        <a class="logo" href="index.html">BrewVerse<span>.</span></a>
        <ul class="menu-links">
          <li><a href="index.html">Home</a></li>
          <li><a class="active-link" href="menu.html">Menu</a></li>
          <li><a href="cart.html">Cart</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <button id="open-cart-btn" class="icon-btn" aria-label="Open cart">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span class="cart-count-badge">0</span>
        </button>
      </nav>
    </header>

    <main class="container page-main with-top-gap">
      <section class="section">
        <div class="section-head">
          <h2>All Coffee Types</h2>
          <p>Select size and quantity on each card before adding to cart.</p>
        </div>
        <div class="menu-controls">
          <div id="category-chips" class="chips"></div>
          <label class="search-box" for="search-input">
            <span class="material-symbols-outlined">search</span>
            <input id="search-input" type="search" placeholder="Search coffee...">
          </label>
        </div>
        <div id="products-grid" class="products-grid"></div>
      </section>
    </main>

    <div id="overlay" class="overlay"></div>
    <aside id="cart-drawer" class="cart-drawer">
      <div class="drawer-head">
        <h3>Your Cart</h3>
        <button id="close-cart-btn" class="icon-btn small-btn" aria-label="Close cart">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <ul id="cart-items" class="cart-items"></ul>
      <div class="drawer-summary">
        <div class="summary-row"><span>Items</span><span id="item-total">0</span></div>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal-total">$0.00</span></div>
        <div class="summary-row"><span>Tax (8%)</span><span id="tax-total">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="price-total">$0.00</span></div>
      </div>
      <div class="drawer-actions">
        <button id="clear-cart-btn" class="btn secondary-btn">Clear</button>
        <button id="checkout-btn" class="btn primary-btn">Checkout</button>
      </div>
    </aside>

    <section id="order-modal" class="order-modal">
      <div class="order-card">
        <h3>Order Confirmed</h3>
        <p class="muted">Thanks for ordering with BrewVerse.</p>
        <ul id="order-summary-list" class="order-list"></ul>
        <p class="order-total">Grand Total: <strong id="order-summary-total">$0.00</strong></p>
        <button id="close-order-modal" class="btn primary-btn">Close</button>
      </div>
    </section>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
